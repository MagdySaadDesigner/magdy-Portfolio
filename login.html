<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0f0f14;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #17171d;
    border: 1px solid rgba(228,228,231,0.08);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 48px;
    height: 48px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    color: #6366f1;
  }
  .logo h1 { font-size: 18px; font-weight: 600; }
  .logo p { font-size: 13px; color: #71717a; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #a1a1aa; margin-bottom: 6px; }
  input {
    width: 100%;
    background: #1f1f28;
    border: 1px solid rgba(228,228,231,0.08);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: #e4e4e7;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus { border-color: rgba(99,102,241,0.4); }
  .btn {
    width: 100%;
    padding: 11px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .btn:hover { background: #4f46e5; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    font-size: 13px;
    color: #f87171;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 12px;
    display: none;
  }
  .back {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #71717a;
    text-decoration: none;
    transition: color 0.2s;
  }
  .back:hover { color: #a1a1aa; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Admin Access</h1>
    <p>Portfolio CMS — Magdy Saad</p>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  <div class="error" id="errorMsg"></div>
  <a href="/" class="back">← Back to portfolio</a>
</div>

<script>
const SUPABASE_URL = 'https://xqidbcjswefsslvhoxpe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaWRiY2pzd2Vmc3NsdmhveHBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTQ1NTcsImV4cCI6MjA5NTIzMDU1N30.FrEj8v5-T3x9SYyxBsJSMZXJ1zChK1XYXdm-jN9PEBQ';

// If already logged in redirect to admin
const session = sessionStorage.getItem('sb_session');
if (session) window.location.href = 'admin.html';

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Please enter email and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errorEl.style.display = 'none';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error_description || data.msg || 'Invalid credentials');
    }

    // Store session token (not password) in sessionStorage
    sessionStorage.setItem('sb_session', data.access_token);
    sessionStorage.setItem('sb_user', data.user?.email || email);

    window.location.href = 'admin.html';

  } catch (e) {
    showError(e.message === 'Invalid login credentials' ? 'Incorrect email or password.' : e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
